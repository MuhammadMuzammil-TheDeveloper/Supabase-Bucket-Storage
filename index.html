    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Supabase Storage CRUD</title>

        <style>
            *{
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: Arial, sans-serif;
            }

            body{
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background: linear-gradient(135deg,#0f172a,#1e293b);
                padding: 20px;
            }

            .container{
                width: 100%;
                max-width: 600px;
                background: white;
                padding: 30px;
                border-radius: 20px;
                box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            }

            h1{
                text-align: center;
                margin-bottom: 25px;
                color: #0f172a;
            }

            .upload-box{
                border: 2px dashed #cbd5e1;
                border-radius: 12px;
                padding: 20px;
                text-align: center;
                margin-bottom: 20px;
            }

            #fileData{
                width: 100%;
                padding: 10px;
                cursor: pointer;
            }

            .btn-group{
                display: grid;
                grid-template-columns: repeat(2,1fr);
                gap: 12px;
                margin-top: 20px;
            }

            button{
                border: none;
                padding: 12px;
                border-radius: 10px;
                color: white;
                font-weight: bold;
                cursor: pointer;
                transition: .3s;
            }

            button:hover{
                transform: translateY(-2px);
            }

            .create-btn{
                background: #22c55e;
            }

            .read-btn{
                background: #3b82f6;
            }

            .update-btn{
                background: #f59e0b;
            }

            .delete-btn{
                background: #ef4444;
            }

            .preview-section{
                margin-top: 25px;
                text-align: center;
            }

            .preview-section h3{
                margin-bottom: 15px;
                color: #334155;
            }

            #preview{
                width: 100%;
                max-width: 350px;
                border-radius: 15px;
                border: 2px solid #e2e8f0;
                object-fit: cover;
                min-height: 200px;
                background: #f8fafc;
            }

            .info{
                margin-top: 15px;
                padding: 10px;
                background: #f1f5f9;
                border-radius: 10px;
                color: #475569;
                text-align: center;
            }
        </style>
    </head>

    <body>

        <div class="container">

            <h1>📁 Supabase Storage CRUD</h1>

            <div class="upload-box">
                <input type="file" id="fileData">
            </div>

            <div class="btn-group">
                <button class="create-btn" onclick="fileUpload()">
                    Upload File
                </button>

                <button class="read-btn" onclick="readFile()">
                    Read Files
                </button>

                <button class="update-btn">
                    Update File
                </button>

                <button class="delete-btn">
                    Delete File
                </button>
            </div>

            <div class="preview-section">
                <h3>File Preview</h3>
                <img id="preview" alt="Preview Image">
            </div>

            <div class="info">
                Create • Read • Update • Delete using Supabase Storage
            </div>

        </div>

    </body>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app.js"></script>
    </html>
