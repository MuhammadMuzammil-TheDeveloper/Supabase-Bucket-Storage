<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase Storage CRUD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --border2: #484f58;
      --accent: #3fb950;
      --accent2: #58a6ff;
      --warn: #d29922;
      --danger: #f85149;
      --text: #e6edf3;
      --text2: #8b949e;
      --text3: #484f58;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 1rem;
    }

    .panel {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 48px rgba(0,0,0,.5);
    }

    /* ── Header ── */
    .panel-header {
      padding: 1.25rem 1.75rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      width: 36px; height: 36px;
      background: rgba(63,185,80,.12);
      border: 1px solid rgba(63,185,80,.25);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .header-icon svg { width: 18px; height: 18px; stroke: var(--accent); fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
    .header-text h2 { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -.2px; }
    .header-text p  { font-size: 12px; color: var(--text2); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
    .status-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      margin-left: auto;
      box-shadow: 0 0 8px rgba(63,185,80,.6);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Body ── */
    .panel-body { padding: 1.5rem 1.75rem; }

    /* drop zone */
    .drop-zone {
      border: 1.5px dashed var(--border2);
      border-radius: var(--radius);
      padding: 1.75rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
      margin-bottom: 1rem;
    }
    .drop-zone:hover, .drop-zone.drag {
      border-color: var(--accent);
      background: rgba(63,185,80,.04);
    }
    .drop-zone.drag .dz-icon svg { stroke: var(--accent); }
    .dz-icon {
      width: 40px; height: 40px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px;
    }
    .dz-icon svg { width: 20px; height: 20px; stroke: var(--text2); fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; transition: stroke .2s; }
    .dz-label  { font-size: 13.5px; color: var(--text2); margin-bottom: 4px; }
    .dz-label span { color: var(--accent2); cursor: pointer; }
    .dz-meta   { font-size: 11.5px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
    #fileData  { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

    /* file chip */
    .file-chip {
      display: none;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 1rem;
      font-size: 13px;
    }
    .file-chip.visible { display: flex; }
    .chip-icon {
      width: 28px; height: 28px;
      background: rgba(88,166,255,.1);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .chip-icon svg { width: 14px; height: 14px; stroke: var(--accent2); fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
    .chip-name { flex: 1; color: var(--text); font-family: 'JetBrains Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chip-size { font-size: 11px; color: var(--text2); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
    .chip-clear {
      width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text3); border-radius: 4px;
      transition: color .15s, background .15s;
    }
    .chip-clear:hover { color: var(--danger); background: rgba(248,81,73,.1); }

    /* buttons */
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn {
      border: 1px solid;
      padding: 10px 14px;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: transform .15s, background .15s, border-color .15s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      letter-spacing: -.1px;
    }
    .btn:hover   { transform: translateY(-1px); }
    .btn:active  { transform: translateY(0) scale(.98); }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .btn svg { width: 15px; height: 15px; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

    .btn-create { background: rgba(63,185,80,.1);  border-color: rgba(63,185,80,.3);  color: var(--accent);  }
    .btn-create:hover { background: rgba(63,185,80,.18); border-color: rgba(63,185,80,.5); }
    .btn-create svg   { stroke: var(--accent); }

    .btn-read   { background: rgba(88,166,255,.1); border-color: rgba(88,166,255,.3); color: var(--accent2); }
    .btn-read:hover   { background: rgba(88,166,255,.18); border-color: rgba(88,166,255,.5); }
    .btn-read svg     { stroke: var(--accent2); }

    .btn-update { background: rgba(210,153,34,.1); border-color: rgba(210,153,34,.3); color: var(--warn); }
    .btn-update:hover { background: rgba(210,153,34,.18); border-color: rgba(210,153,34,.5); }
    .btn-update svg   { stroke: var(--warn); }

    .btn-delete { background: rgba(248,81,73,.1);  border-color: rgba(248,81,73,.3);  color: var(--danger); }
    .btn-delete:hover { background: rgba(248,81,73,.18); border-color: rgba(248,81,73,.5); }
    .btn-delete svg   { stroke: var(--danger); }

    /* divider */
    .divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

    /* file list */
    .section-label { font-size: 11px; color: var(--text2); font-family: 'JetBrains Mono', monospace; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
    .file-list { display: flex; flex-direction: column; gap: 6px; max-height: 220px; overflow-y: auto; }
    .file-list::-webkit-scrollbar { width: 4px; }
    .file-list::-webkit-scrollbar-track { background: transparent; }
    .file-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .file-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .file-row:hover { border-color: var(--border2); background: #2a3038; }
    .file-row.selected { border-color: rgba(88,166,255,.5); background: rgba(88,166,255,.06); }
    .file-row-icon { width: 24px; height: 24px; background: rgba(88,166,255,.1); border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .file-row-icon svg { width: 12px; height: 12px; stroke: var(--accent2); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .file-row-name { flex: 1; font-size: 12.5px; font-family: 'JetBrains Mono', monospace; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-row-size { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
    .file-list-empty { font-size: 12px; color: var(--text3); font-family: 'JetBrains Mono', monospace; text-align: center; padding: 1.5rem 0; }

    /* preview */
    .preview-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .preview-badge {
      font-size: 10.5px; font-family: 'JetBrains Mono', monospace;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 3px 8px; color: var(--text3);
    }
    .preview-frame {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      min-height: 160px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .preview-placeholder { text-align: center; }
    .preview-placeholder svg { width: 32px; height: 32px; stroke: var(--text3); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; margin-bottom: 8px; }
    .preview-placeholder p { font-size: 12px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
    #preview { width: 100%; max-height: 240px; object-fit: contain; display: none; }

    /* toast */
    #toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; display: flex; flex-direction: column; gap: 8px; z-index: 9999; }
    .toast {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      animation: slideIn .25s ease;
      max-width: 320px;
    }
    @keyframes slideIn { from { opacity:0; transform: translateX(16px); } to { opacity:1; transform: translateX(0); } }
    .toast.success { border-color: rgba(63,185,80,.4); color: var(--accent); }
    .toast.error   { border-color: rgba(248,81,73,.4); color: var(--danger); }
    .toast.info    { border-color: rgba(88,166,255,.4); color: var(--accent2); }
    .toast.warn    { border-color: rgba(210,153,34,.4); color: var(--warn); }
    .toast-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .toast.success .toast-dot { background: var(--accent); }
    .toast.error   .toast-dot { background: var(--danger); }
    .toast.info    .toast-dot { background: var(--accent2); }
    .toast.warn    .toast-dot { background: var(--warn); }

    /* spinner */
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.15); border-top-color: currentColor; border-radius: 50%; animation: spin .6s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* footer */
    .panel-footer {
      padding: .875rem 1.75rem;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .footer-tag {
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 5px; padding: 2px 7px; color: var(--text3);
    }
    .footer-tag.active { border-color: rgba(63,185,80,.3); color: var(--accent); background: rgba(63,185,80,.08); }

    /* loading overlay on preview */
    .preview-loading {
      position: absolute; inset: 0;
      display: none;
      align-items: center; justify-content: center;
      background: rgba(13,17,23,.7);
    }
    .preview-loading.show { display: flex; }
    .preview-loading .spinner { width: 22px; height: 22px; border-width: 2.5px; color: var(--accent2); }
  </style>
</head>
<body>

<div class="panel">

  <!-- Header -->
  <div class="panel-header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M3 7h18M3 12h18M3 17h18"/><rect x="3" y="3" width="18" height="18" rx="3"/></svg>
    </div>
    <div class="header-text">
      <h2>Storage Manager</h2>
      <p id="bucketLabel">supabase / —</p>
    </div>
    <div class="status-dot" title="Connected"></div>
  </div>

  <!-- Body -->
  <div class="panel-body">

    <!-- Drop zone -->
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileData">
      <div class="dz-icon">
        <svg viewBox="0 0 24 24"><path d="M12 16V8M8 12l4-4 4 4"/><path d="M20 16.7A4 4 0 0 0 16 8h-.7A7 7 0 1 0 5 15.9"/></svg>
      </div>
      <p class="dz-label">Drop file here or <span>browse</span></p>
      <p class="dz-meta">Any file type · up to 50 MB</p>
    </div>

    <!-- File chip -->
    <div class="file-chip" id="fileChip">
      <div class="chip-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <span class="chip-name" id="chipName">filename.png</span>
      <span class="chip-size" id="chipSize">0 KB</span>
      <div class="chip-clear" id="chipClear" title="Remove">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
    </div>

    <!-- CRUD Buttons -->
    <div class="btn-grid">
      <button class="btn btn-create" id="btnUpload" onclick="fileUpload()">
        <svg viewBox="0 0 24 24" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Upload
      </button>
      <button class="btn btn-read" id="btnRead" onclick="listFiles()">
        <svg viewBox="0 0 24 24" stroke="currentColor"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Read Files
      </button>
      <button class="btn btn-update" id="btnUpdate" onclick="updateFile()">
        <svg viewBox="0 0 24 24" stroke="currentColor"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Update
      </button>
      <button class="btn btn-delete" id="btnDelete" onclick="deleteFile()">
        <svg viewBox="0 0 24 24" stroke="currentColor"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Delete
      </button>
    </div>

    <hr class="divider">

    <!-- File list -->
    <div class="section-label">
      <span>Bucket files</span>
      <span id="fileCount" style="color:var(--text3)">0 files</span>
    </div>
    <div class="file-list" id="fileList">
      <p class="file-list-empty">Click "Read Files" to load your bucket</p>
    </div>

    <hr class="divider">

    <!-- Preview -->
    <div class="preview-header">
      <span class="section-label" style="margin:0">Preview</span>
      <span class="preview-badge" id="previewBadge">no file selected</span>
    </div>
    <div class="preview-frame" id="previewFrame">
      <div class="preview-placeholder" id="previewPlaceholder">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <p>no preview</p>
      </div>
      <img id="preview" alt="Preview">
      <div class="preview-loading" id="previewLoading">
        <div class="spinner"></div>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="panel-footer">
    <span class="footer-tag active">create</span>
    <span class="footer-tag">read</span>
    <span class="footer-tag">update</span>
    <span class="footer-tag">delete</span>
  </div>

</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./app.js"></script>
</body>
</html>
